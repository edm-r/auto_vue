name: 📊 Commit Activity Report

on:
  push:
    branches-ignore: [ "main", "master" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Git Analysis
        id: git_analysis
        run: |
          git fetch origin dev || true
          BASE_BRANCH="origin/dev"
          MODIFIED=$(git diff --name-only --diff-filter=M $BASE_BRANCH...HEAD || echo "")
          CREATED=$(git diff --name-only --diff-filter=A $BASE_BRANCH...HEAD || echo "")

          echo "MODIFIED_FILES<<END_ENV" >> $GITHUB_ENV
          echo "$MODIFIED" >> $GITHUB_ENV
          echo "END_ENV" >> $GITHUB_ENV

          echo "CREATED_FILES<<END_ENV" >> $GITHUB_ENV
          echo "$CREATED" >> $GITHUB_ENV
          echo "END_ENV" >> $GITHUB_ENV

          echo "BASE_BRANCH=$BASE_BRANCH" >> $GITHUB_ENV

      - name: 📝 Post Detailed Report
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branchName = process.env.BRANCH_NAME;
            const modified = process.env.MODIFIED_FILES || '';
            const created = process.env.CREATED_FILES || '';
            const match = branchName.match(/(\d+)/);
            let targetIssueNumber = match ? match[1] : null;

            if (!targetIssueNumber) {
                console.log("⚠️ Aucun ID trouvé dans le nom de la branche. Le rapport ne sera pas posté.");
                return;
            }

            let body = `## 📊 Rapport d'activité du Commit\n\n`;
            body += `**Branche** : \`${branchName}\`\n`;
            body += `**Commit** : \`${context.sha.substring(0, 7)}\`\n\n`;
            body += `### 📂 Mouvements de fichiers\n`;
            body += `<details><summary>Fichiers Modifiés (${modified.split('\n').filter(x => x).length})</summary>\n\n\`\`\`\n${modified}\n\`\`\`\n</details>\n\n`;
            body += `<details><summary>Fichiers Créés (${created.split('\n').filter(x => x).length})</summary>\n\n\`\`\`\n${created}\n\`\`\`\n</details>\n\n`;
            body += `\n> *Ce rapport est posté ici car la branche contient l'ID #${targetIssueNumber}.*`;

            try {
                await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parseInt(targetIssueNumber),
                    body: body
                });
                console.log(`✅ SUCCÈS : Commentaire posté sur l'Issue #${targetIssueNumber}`);
            } catch (err) {
                console.log(`❌ ERREUR API : ${err.message}`);
            }